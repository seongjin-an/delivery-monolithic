server:
  port: 8080

spring:
  application:
    name: delivery

  datasource:
    url: jdbc:postgresql://localhost:5432/delivery
    username: delivery
    password: delivery
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  data:
    redis:
      host: localhost
      port: 6379



jwt:
  secret: delivery-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiration: 3600000      # 1시간
  refresh-token-expiration: 604800000   # 7일

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

kind: Application
